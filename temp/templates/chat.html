<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <title>Chatroom</title>\n</head>\n<body>\n    <h1>Chatroom</h1>\n    <form method="POST">\n        <input type="text" name="message" placeholder="Type a message..." required>\n        <button type="submit">Send</button>\n    </form>\n    {% if messages %}\n        <ul>\n            {% for message in messages %}\n                <li>{{ message }}</li>\n            {% endfor %}\n        </ul>\n    {% endif %}\n</body>\n</html>
